# =============================================================================
# 3S Engenharia — Configurações de qualidade de código Python
# Linting e formatação são gerenciados pelo Ruff (ver pyproject.toml)
# =============================================================================

# --- pytest ---
[tool:pytest]
DJANGO_SETTINGS_MODULE = backend_django.settings.development
python_files = tests/test_*.py tests/*_test.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    --cov=apps
    --cov-report=term-missing
    --cov-fail-under=70

# --- coverage ---
[coverage:run]
omit =
    */migrations/*
    */tests/*
    manage.py
    backend_django/settings/*
    backend_django/wsgi.py
    backend_django/asgi.py

