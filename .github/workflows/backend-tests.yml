name: Backend Tests

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'back-end/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [ main, dev ]
    paths:
      - 'back-end/**'
      - '.github/workflows/backend-tests.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    defaults:
      run:
        working-directory: ./back-end
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: back-end/requirements-ci.txt
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel

        for attempt in 1 2 3; do
          python -m pip install --prefer-binary -r requirements-ci.txt && break
          echo "Tentativa $attempt de instalar dependências falhou."
          if [ "$attempt" -eq 3 ]; then
            exit 1
          fi
          sleep 5
        done
    
    - name: Run Ruff linter
      run: |
        python -m ruff check apps/ backend_django/
    
    - name: Run Ruff formatter check
      run: |
        python -m ruff format --check apps/ backend_django/
    
    - name: Run migrations check
      run: |
        python manage.py makemigrations --check --dry-run --no-input
      env:
        DJANGO_SETTINGS_MODULE: backend_django.settings.development
    
    - name: Run tests
      run: |
        python -m pytest apps/ -v
      env:
        DJANGO_SETTINGS_MODULE: backend_django.settings.development
